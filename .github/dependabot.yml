version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Rome
    labels: [dependencies]
    commit-message:
      prefix: "build"
