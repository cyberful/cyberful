name: Release

on:
  schedule:
    - cron: "0 8 * * 1-5"
      timezone: "Europe/Rome"
  workflow_dispatch:
    inputs:
      bump:
        description: Automatic SemVer bump, or a higher manual minimum
        required: true
        default: auto
        type: choice
        options: [auto, patch, minor, major]
      force_without_changes:
        description: Publish a patch even when there are no distributable changes
        required: true
        default: false
        type: boolean
      reason:
        description: Required reason when forcing a release without changes
        required: false
        type: string
      dry_run:
        description: Verify, build, and assemble without tagging or publishing
        required: true
        default: false
        type: boolean

concurrency:
  group: npm-stable-release
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14
  NODE_VERSION: 24.4.0
  NPM_VERSION: 11.5.1

jobs:
  plan:
    name: Plan immutable release
    runs-on: ubuntu-24.04
    outputs:
      release: ${{ steps.release_plan.outputs.release }}
      version: ${{ steps.release_plan.outputs.version }}
      bump: ${{ steps.release_plan.outputs.bump }}
      head: ${{ steps.release_plan.outputs.head }}
      resume: ${{ steps.release_plan.outputs.resume }}
      previous_tag: ${{ steps.release_plan.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - id: recovery
        name: Find a partial release before considering new commits
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="$(git tag --merged "${{ github.sha }}" --list 'v*' --sort=-version:refname | head -n 1)"
          resume=""
          if [[ -n "$tag" ]]; then
            if ! draft="$(gh release view "$tag" --json isDraft --jq .isDraft 2>/dev/null)"; then
              resume="$tag"
            elif [[ "$draft" == true ]]; then
              resume="$tag"
            fi
          fi
          echo "resume_tag=$resume" >> "$GITHUB_OUTPUT"
      - id: release_plan
        name: Calculate the automatic version
        env:
          RELEASE_HEAD: ${{ github.sha }}
          RELEASE_RESUME_TAG: ${{ steps.recovery.outputs.resume_tag }}
          RELEASE_BUMP: ${{ inputs.bump || 'auto' }}
          RELEASE_FORCE: ${{ inputs.force_without_changes || false }}
          RELEASE_REASON: ${{ inputs.reason || '' }}
        run: bun scripts/release-plan.ts --github-output
      - name: Explain a no-op
        if: steps.release_plan.outputs.release != 'true'
        run: echo "No distributable changes exist after the latest stable tag."

  verify:
    name: Complete verification
    if: needs.plan.outputs.release == 'true'
    needs: [plan]
    uses: ./.github/workflows/_verify.yml
    with:
      ref: ${{ needs.plan.outputs.head }}

  build:
    name: Release native packages
    if: needs.plan.outputs.release == 'true'
    needs: [plan, verify]
    uses: ./.github/workflows/_build.yml
    with:
      ref: ${{ needs.plan.outputs.head }}
      version: ${{ needs.plan.outputs.version }}
      channel: latest
      retention_days: 7

  assemble:
    name: Assemble release assets
    if: needs.plan.outputs.release == 'true'
    needs: [plan, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
        with:
          ref: ${{ needs.plan.outputs.head }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --global "npm@${NPM_VERSION}"
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          pattern: native-*
          path: release-inputs
      - name: Create archives from the verified binaries
        run: >-
          bun scripts/prepare-release-assets.ts
          --input release-inputs
          --output release-assets
          --version "${{ needs.plan.outputs.version }}"
      - name: Pack the public launcher
        run: >-
          bun cyberful/script/package-npm.ts
          --meta
          --version "${{ needs.plan.outputs.version }}"
          --output release-meta
      - name: Add the launcher package to the release set
        shell: bash
        run: cp release-meta/packages/*.tgz release-assets/
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.22.2
        with:
          path: .
          format: spdx-json
          output-file: release-assets/cyberful-v${{ needs.plan.outputs.version }}.spdx.json
          artifact-name: cyberful-v${{ needs.plan.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - run: bun scripts/write-checksums.ts release-assets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: release-v${{ needs.plan.outputs.version }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Tag and publish
    if: needs.plan.outputs.release == 'true' && inputs.dry_run != true
    needs: [plan, assemble]
    runs-on: ubuntu-24.04
    environment: npm-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.1
        with:
          ref: ${{ needs.plan.outputs.head }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - run: npm install --global "npm@${NPM_VERSION}"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: release-v${{ needs.plan.outputs.version }}
          path: release-assets
      - name: Create or verify the annotated tag
        env:
          TAG: v${{ needs.plan.outputs.version }}
          RELEASE_HEAD: ${{ needs.plan.outputs.head }}
          RELEASE_REASON: ${{ inputs.reason || '' }}
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            test "$(git cat-file -t "refs/tags/$TAG")" = tag
            test "$(git rev-parse "$TAG^{commit}")" = "$RELEASE_HEAD"
          else
            message="Cyberful $TAG"
            if [[ -n "$RELEASE_REASON" ]]; then
              message="$(printf 'Cyberful %s\n\nRelease reason: %s' "$TAG" "$RELEASE_REASON")"
            fi
            git tag --annotate "$TAG" "$RELEASE_HEAD" --message "$message"
            git push origin "refs/tags/$TAG"
          fi
      - name: Create or verify the draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.plan.outputs.version }}
          RELEASE_REASON: ${{ inputs.reason || '' }}
        shell: bash
        run: |
          if gh release view "$TAG" --json isDraft --jq .isDraft >/tmp/cyberful-draft 2>/dev/null; then
            test "$(cat /tmp/cyberful-draft)" = true
          else
            args=(release create "$TAG" --draft --verify-tag --generate-notes --title "$TAG")
            if [[ -n "$RELEASE_REASON" ]]; then args+=(--notes "Manual release reason: $RELEASE_REASON"); fi
            gh "${args[@]}"
          fi
      - id: existing_provenance
        name: Reuse provenance already attached to a partial release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.plan.outputs.version }}
          VERSION: ${{ needs.plan.outputs.version }}
        shell: bash
        run: |
          name="cyberful-v${VERSION}.intoto.jsonl"
          exists="$(gh release view "$TAG" --json assets --jq ".assets | any(.name == \"$name\")")"
          if [[ "$exists" == true ]]; then
            gh release download "$TAG" --pattern "$name" --dir release-assets
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "reused=false" >> "$GITHUB_OUTPUT"
          fi
      - id: attest
        if: steps.existing_provenance.outputs.reused != 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: release-assets/SHA256SUMS
      - name: Add the provenance bundle
        if: steps.existing_provenance.outputs.reused != 'true'
        env:
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
          VERSION: ${{ needs.plan.outputs.version }}
        run: cp "$BUNDLE" "release-assets/cyberful-v${VERSION}.intoto.jsonl"
      - name: Upload release assets without overwriting
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          bun scripts/upload-release-assets.ts
          --tag "v${{ needs.plan.outputs.version }}"
          --directory release-assets
      - name: Publish platform packages, then the public launcher
        run: >-
          bun scripts/publish-npm.ts
          --directory release-assets
          --version "${{ needs.plan.outputs.version }}"
      - name: Publish the immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ needs.plan.outputs.version }}" --draft=false --latest

  required:
    name: Release / required
    if: always()
    needs: [plan, verify, build, assemble, publish]
    runs-on: ubuntu-24.04
    steps:
      - name: Require the applicable release stages
        env:
          RELEASE: ${{ needs.plan.outputs.release }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        shell: bash
        run: |
          test "${{ needs.plan.result }}" = success
          if [[ "$RELEASE" != true ]]; then exit 0; fi
          test "${{ needs.verify.result }}" = success
          test "${{ needs.build.result }}" = success
          test "${{ needs.assemble.result }}" = success
          if [[ "$DRY_RUN" != true ]]; then test "${{ needs.publish.result }}" = success; fi
