name: Feature request
description: Propose a scoped improvement to Cyberful.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What authorized security workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result rather than a specific implementation.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Security and operational boundaries
      description: Note authorization, isolation, privacy, telemetry, or compatibility constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
